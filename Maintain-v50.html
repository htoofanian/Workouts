<style>

    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface2: #e8e8ed;
    --border: #d1d1d6;
    --text: #1c1c1e;
    --muted: #990000;
    --accent: #cc0000;
    --blue: #3b82f6;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 18px; min-height: 100vh; padding-bottom: 120px; }

  /* Desktop view - constrain to iPhone width */

    body { background: #f2efea; display: flex; justify-content: center; padding-top: 20px; }
    body::before { content: ''; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 390px; height: calc(100vh - 40px); background: var(--bg); border-radius: 0; box-shadow: 0 0 0 3px #2a2a2a, 0 20px 60px rgba(0,0,0,0.4); z-index: -1; }
    #app-container { max-width: 390px; width: 100%; background: var(--bg); min-height: calc(100vh - 40px); border-radius: 0; overflow-x: hidden; overflow-y: auto; scrollbar-width: none; }
#app-container::-webkit-scrollbar { display: none; }

  }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px 8px; position: sticky; top: 0; z-index: 100; }

  .subtitle { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .header-btns { display: flex; gap: 8px; align-items: center; }
  .btn { border: none; border-radius: 10px; padding: 7px 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:active { transform: scale(0.95); opacity: 0.85; }
  .btn-orange { background: var(--accent); color: #fff; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-gray { background: var(--surface2); color: var(--text); }
  .day-block { margin: 0 12px 6px; }
  .day-header { display: flex; align-items: center; gap: 10px; padding: 10px 4px 10px; }
  .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--accent); }
  .day-sub { font-size: 16px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 700; }
  .day-progress { margin-left: auto; font-size: 16px; color: var(--muted); font-weight: 700; }
  .day-progress span { color: var(--accent); font-weight: 600; }
  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  .exercise-list { background: var(--surface); border-radius: 14px; overflow: hidden; border: 3px solid var(--border); }
  .exercise-group { border: 2px solid var(--blue); border-radius: 12px; margin: 8px 8px 0 8px; overflow: hidden; }
  .exercise-group .exercise-item { border-bottom: 1px solid var(--border); }
  .exercise-group .exercise-item:last-child { border-bottom: none; }
  .exercise-group + .exercise-item { border-top: 1px solid var(--border); margin-top: 8px; }

  /* Normal mode */
  .exercise-item { display: flex; align-items: center; padding: 9px 14px; border-bottom: 1px solid var(--border); gap: 12px; user-select: none; }
  .exercise-item:last-child { border-bottom: none; }
  .checkbox-zone { display: flex; align-items: center; padding: 8px; margin: -8px; cursor: pointer; flex-shrink: 0; }
  .checkbox-zone:active .checkbox { transform: scale(0.9); }
  .checkbox { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: transparent; }
  .exercise-item.done .checkbox { background: #ff8c00; border-color: #ff8c00; }
  .checkmark { display: none; width: 11px; height: 8px; }
  .checkmark path { stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .exercise-item.done .checkmark { display: block; }
  .exercise-name { flex: 1; font-size: 15px; font-weight: 500; line-height: 1.3; color: var(--text); }
  .exercise-item.done .exercise-name { color: #c45e00; }
  .exercise-weight { font-size: 15px; font-weight: 500; color: var(--text); }
  .diff-zone { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px; margin: -8px; border-radius: 12px; flex-shrink: 0; }
  .diff-zone:active { background: var(--surface2); }
  .difficulty-btn { width: 24px; height: 24px; border-radius: 50%; border: none; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; background: transparent; transition: all 0.15s; padding: 0; outline: none; -webkit-appearance: none; color: #ddd; font-variant-emoji: text; }
  .difficulty-btn:active { transform: scale(0.9); }
  
  /* Difficulty Picker Grid Adjusted for Tighter Vertical Spacing */
  .difficulty-picker { position: fixed; background: #ffffff; border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: grid; grid-template-columns: repeat(4, 44px); grid-auto-rows: 44px; row-gap: 4px; column-gap: 10px; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
  
  .diff-option { width: 44px; height: 44px; border-radius: 12px; border: none; font-size: 30px; cursor: pointer; background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.1s; line-height: 1; }
  .diff-option.checkmark { color: #22c55e; font-size: 18px; flex-direction: column; gap: 2px; font-variant-emoji: text; }
  .diff-option.checkmark.multi { font-size: 14px; line-height: 1.1; font-variant-emoji: text; }
  .diff-option:active { transform: scale(0.85); }

  /* Edit mode */
  .edit-row { display: grid; grid-template-columns: auto 1fr auto; grid-template-rows: auto auto; padding: 4px 8px; border-bottom: 3px solid var(--border); gap: 2px; background: var(--surface); position: relative; align-items: center; }
  .edit-row:last-child { border-bottom: none; }
  
  /* FIXED DRAG HANDLE FOR MOBILE: Bigger target, prevent text selection, strict left alignment */
  .drag-handle { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 3px; padding: 6px 14px 6px 12px; margin-left: -4px; cursor: grab; flex-shrink: 0; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  .drag-handle span { display: block; width: 18px; height: 2.5px; background: var(--border); border-radius: 2px; }
  
  .edit-inputs { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .edit-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 4px 11px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: var(--text); background: var(--bg); outline: none; }

  /* Save popup */
  .save-popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
  .save-popup-overlay.visible { opacity: 1; pointer-events: all; }

  .save-popup p { font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.4; }

  .save-popup-btns button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .save-popup-btns button:active { transform: scale(0.97); }

  .btn-save-download { background: var(--blue); color: #fff; }
  .btn-save-cancel { background: transparent; color: var(--muted); font-size: 14px; padding: 8px; }

  .header-edit-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; color: var(--accent); background: transparent; border: none; outline: none; width: 160px; padding: 0; line-height: 1; }
  .header-edit-sub { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; background: transparent; border: none; outline: none; width: 140px; padding: 0; margin-top: 2px; font-family: 'DM Sans', sans-serif; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 20px; padding: 16px; width: 100%; max-width: 240px; transform: translateY(20px); transition: transform 0.2s; }
  .modal-overlay.visible .modal { transform: translateY(0); }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .modal-btns button { padding: 7px 14px; border-radius: 10px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .modal-btns button:active { transform: scale(0.97); }
  .btn-cancel-modal { background: var(--surface2); color: var(--text); }
  .btn-confirm-modal { background: var(--accent); color: #fff; }
  .version-info { text-align: right; font-size: 11px; color: #aaa; padding-top: 2px; }
  .edit-heading { display: none; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--blue); letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 0 2px; }
  .edit-heading.visible { display: block; }
  .edit-note { text-align: center; font-size: 12px; color: var(--text); padding: 2px 0 4px; }
  .edit-row.grouped { background: rgb(242, 247, 255); }
</style>
</head>

      <button class="btn btn-gray" id="saveBtn" onclick="showSave()" style="display: inline-flex;">Save</button>
      <button class="btn btn-orange" id="resetBtn" onclick="showReset()" style="display: inline-flex;">↺ Reset</button>

<div class="save-popup-overlay" id="savePopup">

    </div>
    <div id="savePanel2" style="">

      <div class="save-filename-row">
        <label>Filename</label>
        <input class="save-filename-input" id="downloadFilename" type="text" value="MAINTAIN-vxx.html">
      </div>
      <div class="save-popup-btns">
        <button class="btn-save-download" onclick="confirmSaveDownload()">Download</button>
        <button class="btn-save-cancel" onclick="showMainPanel()">← Back</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="hideReset()">Cancel</button>
      <button class="btn-confirm-modal" onclick="confirmReset()">Reset All</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div style="text-align:center;margin-bottom:16px;font-size:15px;color:var(--text);">Delete this exercise?</div>
    <div class="modal-btns">
      <button class="btn-confirm-modal" onclick="confirmDelete()">Delete</button>
      <button class="btn-cancel-modal" onclick="hideDeleteConfirm()">Cancel</button>
    </div>
  </div>
</div>

const DEFAULT_META = {"title":"Workout Log","subtitle":"Maintenance","version":49,"savedDate":"Apr 6, 2026"};

// ── Storage (namespaced separately from push-pull app) ─
function saveDays() { try { localStorage.setItem('maint10_days', JSON.stringify(days)); } catch(e) {} }
function loadDays() { try { const s = localStorage.getItem('maint10_days'); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DAYS)); } catch { return JSON.parse(JSON.stringify(DEFAULT_DAYS)); } }
function saveState() { try { localStorage.setItem('maint10_state', JSON.stringify(state)); } catch(e) {} }
function loadState() { try { const s = localStorage.getItem('maint10_state'); return s ? JSON.parse(s) : {}; } catch { return {}; } }
function saveMeta() { try { localStorage.setItem('maint10_meta', JSON.stringify(meta)); } catch(e) {} }
function loadMeta() { 
  try { 
    const s = localStorage.getItem('maint10_meta'); 
    if (s) {
      const m = JSON.parse(s);
      // Force visual update of version from file regardless of saved state
      m.version = DEFAULT_META.version;
      m.savedDate = DEFAULT_META.savedDate;
      return m;
    }
    return JSON.parse(JSON.stringify(DEFAULT_META)); 
  } catch { return JSON.parse(JSON.stringify(DEFAULT_META)); } 
}

let days = loadDays();
let state = loadState();
let meta = loadMeta();
let openPicker = null;
let pendingDelete = null;
let editMode = false;

function renderHeader() {
  const titleEl = document.getElementById('appTitle');
  const subEl = document.getElementById('appSubtitle');
  if (editMode) {
    titleEl.innerHTML = `<input class="header-edit-title" value="${meta.title.replace(/"/g,'&quot;')}" onchange="meta.title=this.value;saveMeta();">`;
    subEl.innerHTML = `<input class="header-edit-sub" value="${meta.subtitle.replace(/"/g,'&quot;')}" onchange="meta.subtitle=this.value;saveMeta();">`;
  } else {
    titleEl.textContent = meta.title;
    subEl.textContent = meta.subtitle;
  }
  const v = meta.version || 31;
  const d = meta.savedDate || new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  document.getElementById('versionInfo').textContent = 'v' + v + ' · ' + d;
  document.getElementById('editHeading').className = editMode ? 'edit-heading visible' : 'edit-heading';
  document.getElementById('editNote').style.display = editMode ? 'block' : 'none';
}

function key(d,e){return `${d}_${e}`;}
function getEx(d,e){return state[key(d,e)]||{done:false,diff:""};}

function toggleDone(d,e){
  state[key(d,e)]={...getEx(d,e),done:!getEx(d,e).done};
  saveState(); render();
}
function setDiff(d,e,diff){
  state[key(d,e)]={...getEx(d,e),diff};
  openPicker=null; saveState(); render();
}
function displayDiff(d){ return d.includes('✔') ? d.replace(/✔/g, '✔︎') : d; }

let pickerPos = { top: null, bottom: null, right: 8 };

function togglePicker(id, event) {
  event.stopPropagation();
  if (openPicker === id) { openPicker = null; render(); return; }

  const btn = event.currentTarget.querySelector('.difficulty-btn') || event.target.closest('.difficulty-btn') || event.target;
  const rect = btn.getBoundingClientRect();
  const pickerHeight = 160;
  const bottomBarHeight = 80;
  const spaceBelow = window.innerHeight - rect.bottom - bottomBarHeight;
  const right = Math.max(8, window.innerWidth - rect.right - 4);

  if (spaceBelow >= pickerHeight) {
    pickerPos = { top: rect.bottom + 6, bottom: null, right };
  } else {
    pickerPos = { top: null, bottom: window.innerHeight - rect.top + 6, right };
  }

  openPicker = id;
  render();
}

function flushInputs(){
  document.querySelectorAll('.edit-row').forEach(row=>{
    const d=parseInt(row.dataset.d), e=parseInt(row.dataset.e);
    if(!isNaN(d)&&!isNaN(e)&&days[d]&&days[d].exercises[e]){
      const n=row.querySelector('.name-input'), w=row.querySelector('.weight-input');
      if(n) days[d].exercises[e].name=n.value||days[d].exercises[e].name;
      if(w) days[d].exercises[e].detail=w.value;
    }
  });
  saveDays();
}

let editSnapshot = null;

function toggleEdit(){
  if(editMode){ flushInputs(); editSnapshot=null; }
  else { editSnapshot = { days: JSON.parse(JSON.stringify(days)), meta: JSON.parse(JSON.stringify(meta)) }; }
  editMode=!editMode;
  const btn=document.getElementById('editBtn');
  btn.textContent=editMode?'Done':'Edit';
  btn.className=editMode?'btn btn-blue':'btn btn-gray';
  const cancelBtn=document.getElementById('cancelBtn');
  if(cancelBtn) cancelBtn.style.display=editMode?'inline-flex':'none';
  const saveBtn=document.getElementById('saveBtn');
  const resetBtn=document.getElementById('resetBtn');
  if(saveBtn) saveBtn.style.display=editMode?'none':'inline-flex';
  if(resetBtn) resetBtn.style.display=editMode?'none':'inline-flex';
  renderHeader();
  render();
}

function cancelEdit(){
  if(!editSnapshot) return;
  days = editSnapshot.days;
  meta = editSnapshot.meta;
  editSnapshot = null;
  editMode = false;
  saveDays(); saveMeta();
  const btn=document.getElementById('editBtn');
  btn.textContent='Edit';
  btn.className='btn btn-gray';
  document.getElementById('cancelBtn').style.display='none';
  const saveBtn=document.getElementById('saveBtn');
  const resetBtn=document.getElementById('resetBtn');
  if(saveBtn) saveBtn.style.display='inline-flex';
  if(resetBtn) resetBtn.style.display='inline-flex';
  renderHeader();
  render();
}

function showDeleteConfirm(d, e) {
  pendingDelete = { d, e };
  document.getElementById('deleteModal').classList.add('visible');
}

function hideDeleteConfirm() {
  pendingDelete = null;
  document.getElementById('deleteModal').classList.remove('visible');
}

function confirmDelete() {
  if (pendingDelete) {
    const { d, e } = pendingDelete;
    flushInputs();
    days[d].exercises.splice(e,1);
    const ns={};
    Object.keys(state).forEach(k=>{
      const [kd,ke]=k.split('_').map(Number);
      if(kd!==d){ns[k]=state[k];return;}
      if(ke<e) ns[k]=state[k];
      else if(ke>e) ns[`${kd}_${ke-1}`]=state[k];
    });
    state=ns; saveDays(); saveState(); render();
  }
  hideDeleteConfirm();
}

function deleteExercise(d,e){
  showDeleteConfirm(d, e);
}

function addExercise(d){
  flushInputs();
  days[d].exercises.push({name:"New Exercise",detail:""});
  saveDays(); render();
  setTimeout(()=>{
    const rows=document.querySelectorAll(`.edit-row[data-d="${d}"]`);
    if(rows.length){const inp=rows[rows.length-1].querySelector('.name-input');inp.focus();inp.select();}
  },60);
}

// ── Drag to reorder ──────────────────────────────────
let dragState = null;
let autoScrollInterval = null;

function startDrag(clientY, d, fromIdx) {
  flushInputs();
  const rows = Array.from(document.querySelectorAll(`.edit-row[data-d="${d}"]`));
  const dragRow = rows.find(r => parseInt(r.dataset.e) === fromIdx);
  if (!dragRow) return;
  const rowH = dragRow.getBoundingClientRect().height;
  dragRow.style.zIndex = '50';
  dragRow.style.boxShadow = '0 8px 24px rgba(0,0,0,0.18)';
  dragRow.style.opacity = '0.95';
  dragRow.style.borderRadius = '8px';
  document.body.style.cursor = 'grabbing';
  
  // Mobile specific: Prevent text selection highlighting while dragging
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';
  
  dragState = { d, fromIdx, currentIdx: fromIdx, startY: clientY, rowH, rows, dragRow };
}

function updateDrag(clientY) {
  if (!dragState) return;
  const { fromIdx, startY, rowH, rows, dragRow } = dragState;
  const dy = clientY - startY;
  dragRow.style.transform = `translateY(${dy}px)`;
  const newIdx = Math.max(0, Math.min(rows.length - 1, Math.round(fromIdx + dy / rowH)));
  rows.forEach(row => {
    if (row === dragRow) return;
    const idx = parseInt(row.dataset.e);
    let shift = 0;
    if (newIdx > fromIdx && idx > fromIdx && idx <= newIdx) shift = -rowH;
    else if (newIdx < fromIdx && idx >= newIdx && idx < fromIdx) shift = rowH;
    row.style.transition = 'transform 0.15s ease';
    row.style.transform = shift ? `translateY(${shift}px)` : '';
  });
  dragState.currentIdx = newIdx;
  
  // Auto-scroll when near edges
  const scrollZone = 100;
  const scrollSpeed = 8;
  if (autoScrollInterval) {
    clearInterval(autoScrollInterval);
    autoScrollInterval = null;
  }
  
  if (clientY < scrollZone) {
    // Near top - scroll up
    autoScrollInterval = setInterval(() => {
      window.scrollBy(0, -scrollSpeed);
      if (window.scrollY === 0) {
        clearInterval(autoScrollInterval);
        autoScrollInterval = null;
      }
    }, 16);
  } else if (clientY > window.innerHeight - scrollZone) {
    // Near bottom - scroll down
    autoScrollInterval = setInterval(() => {
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      window.scrollBy(0, scrollSpeed);
      if (window.scrollY >= maxScroll) {
        clearInterval(autoScrollInterval);
        autoScrollInterval = null;
      }
    }, 16);
  }
}

function endDrag() {
  if (autoScrollInterval) {
    clearInterval(autoScrollInterval);
    autoScrollInterval = null;
  }
  
  // Re-enable text selection globally
  document.body.style.userSelect = '';
  document.body.style.webkitUserSelect = '';
  
  if (!dragState) return;
  const { d, fromIdx, currentIdx, rows } = dragState;
  dragState = null;
  document.body.style.cursor = '';
  rows.forEach(r => { r.style.transform=''; r.style.transition=''; r.style.zIndex=''; r.style.boxShadow=''; r.style.opacity=''; r.style.borderRadius=''; });
  if (fromIdx !== currentIdx) {
    const arr = days[d].exercises;
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(currentIdx, 0, moved);
    const n = arr.length;
    const oldOrder = Array.from({length: n}, (_,i) => i);
    const [m] = oldOrder.splice(fromIdx, 1);
    oldOrder.splice(currentIdx, 0, m);
    const ns = {};
    Object.keys(state).forEach(k => {
      const [kd, ke] = k.split('_').map(Number);
      if (kd !== d) { ns[k] = state[k]; return; }
    });
    oldOrder.forEach((oldIdx, newIdx) => {
      const oldKey = `${d}_${oldIdx}`;
      if (state[oldKey]) ns[`${d}_${newIdx}`] = state[oldKey];
    });
    state = ns;
    saveDays(); saveState();
  }
  render();
}

function onHandleTouchStart(e, d, fromIdx) { e.preventDefault(); startDrag(e.touches[0].clientY, d, fromIdx); }
function onHandleMouseDown(e, d, fromIdx) { e.preventDefault(); startDrag(e.clientY, d, fromIdx); }
function onTouchMove(e) { if (!dragState) return; e.preventDefault(); updateDrag(e.touches[0].clientY); }
function onMouseMove(e) { if (!dragState) return; updateDrag(e.clientY); }
function onTouchEnd() { endDrag(); }
function onMouseUp() { endDrag(); }

document.addEventListener('touchmove', onTouchMove, { passive: false });
document.addEventListener('touchend', onTouchEnd);
document.addEventListener('mousemove', onMouseMove);
document.addEventListener('mouseup', onMouseUp);

function showSave(){ if(editMode) flushInputs(); document.getElementById('saveMsg').textContent='Your edits are saved in this browser.'; showMainPanel(); document.getElementById('savePopup').classList.add('visible'); }
function hideSave(){ document.getElementById('savePopup').classList.remove('visible'); }
function showMainPanel(){ document.getElementById('savePanel1').style.display=''; document.getElementById('savePanel2').style.display='none'; }
function showDownloadPanel(){ document.getElementById('savePanel1').style.display='none'; document.getElementById('savePanel2').style.display=''; document.getElementById('downloadFilename').value='MAINTAIN-v'+((meta.version||31)+1)+'.html'; }
function confirmSaveLocal(){
  saveState(); saveDays(); saveMeta();
  document.getElementById('saveMsg').textContent='✓ Saved!';
  setTimeout(hideSave, 1200);
}
function confirmSaveDownload(){
  if(editMode) flushInputs();
  const filename = document.getElementById('downloadFilename').value.trim() || 'MAINTAIN-vxx.html';
  meta.version = (meta.version || 31) + 1;
  meta.savedDate = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  saveMeta();
  // Close popup and exit edit mode first, then capture DOM after it updates
  document.getElementById('savePopup').classList.remove('visible');
  if(editMode){
    editMode=false;
    document.getElementById('editBtn').textContent='Edit';
    document.getElementById('editBtn').className='btn btn-gray';
    document.getElementById('cancelBtn').style.display='none';
  }
  renderHeader();
  render();
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      let html = document.documentElement.outerHTML;
      html = html.replace(/const DEFAULT_DAYS = \[[\s\S]*?\];/, 'const DEFAULT_DAYS = ' + JSON.stringify(days, null, 2) + ';');
      html = html.replace(/const DEFAULT_META = \{[^}]*\};/, 'const DEFAULT_META = ' + JSON.stringify(meta) + ';');
      const blob = new Blob([html], {type:'text/html'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  });
}

function showReset(){
  if(editMode) flushInputs();
  document.getElementById('resetModal').classList.add('visible');
}
function hideReset(){ document.getElementById('resetModal').classList.remove('visible'); }
function confirmReset(){
  Object.keys(state).forEach(k=>{ if(state[k]) state[k].done=false; });
  saveState(); hideReset(); render();
}

document.addEventListener('click',()=>{ if(openPicker!==null){openPicker=null;render();} });

// ── Render ───────────────────────────────────────────
function countExercisesAndGroups(dayData, d) {
  let total = 0;
  let done = 0;
  const seenGroups = new Set();
  
  dayData.exercises.forEach((ex, e) => {
    if (ex.group) {
      if (!seenGroups.has(ex.group)) {
        seenGroups.add(ex.group);
        total++;
        // Group is done if ANY exercise in the group is done
        const anyDone = dayData.exercises.some((gex, ge) => 
          gex.group === ex.group && getEx(d, ge).done
        );
        if (anyDone) done++;
      }
    } else {
      total++;
      if (getEx(d, e).done) done++;
    }
  });
  
  return { total, done };
}

function rebuildGroupsFromCheckboxes() {
  days.forEach(dayData => {
    let groupCounter = 1;
    let currentGroup = null;
    
    dayData.exercises.forEach((ex, i) => {
      // Clear existing group property
      delete ex.group;
      
      // If previous exercise had groupWithNext checked, we're in a group
      if (i > 0 && dayData.exercises[i-1].groupWithNext) {
        if (!currentGroup) {
          currentGroup = `group_${groupCounter}`;
          // Apply to previous exercise too
          dayData.exercises[i-1].group = currentGroup;
        }
        ex.group = currentGroup;
      }
      
      // If current exercise has groupWithNext, continue the group
      if (ex.groupWithNext) {
        if (!currentGroup) {
          currentGroup = `group_${groupCounter}`;
        }
        ex.group = currentGroup;
      } else {
        // End of group
        if (currentGroup) {
          groupCounter++;
          currentGroup = null;
        }
      }
    });
  });
}

function renderDiffOption(d2, d, e) {
  if (d2 === '') return '<button class="diff-option" style="visibility:hidden"></button>';
  
  let content, cssClass = 'diff-option';
  
  if (d2 === '⬤') {
    content = '×';
  } else if (d2 === '✔') {
    content = '✔︎';
    cssClass += ' checkmark';
  } else if (d2 === '✔✔') {
    content = '✔︎✔︎';
    cssClass += ' checkmark multi';
  } else if (d2 === '✔✔✔') {
    content = '✔︎✔︎✔︎';
    cssClass += ' checkmark multi';
  } else {
    content = d2;
  }
  
  return `<button class="${cssClass}" onclick="setDiff(${d},${e},'${d2}')">${content}</button>`;
}

function render(){
  rebuildGroupsFromCheckboxes();
  const app=document.getElementById('app');
  let html='';

  days.forEach((dayData,d)=>{
    html+=`<div class="day-block">`;
    const { total, done } = countExercisesAndGroups(dayData, d);
    const pct = total ? Math.round(done/total*100) : 0;

    if(editMode){
      const daySub = dayData.type + (dayData.gym ? ' · ' + dayData.gym : '');
      html+=`<div class="day-header">
        <input class="day-edit-name" value="${dayData.day.replace(/"/g,'&quot;')}" onchange="days[${d}].day=this.value;saveDays();">
        <input class="day-edit-sub" value="${daySub.replace(/"/g,'&quot;')}" placeholder="type · gym" onchange="days[${d}].type=this.value;days[${d}].gym=null;saveDays();">
      </div>`;
    } else {
      html+=`<div class="day-header">
        <span class="day-name">${dayData.day}</span>
        <span class="day-sub">${dayData.type}${dayData.gym?' · '+dayData.gym:''}</span>
        ${total>0?`<span class="day-progress"><span>${done}</span>/${total}</span>`:''}
      </div>`;
    }

    if(!editMode&&total>0){
      html+=`<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
    }

    if(total>0){
      html+=(editMode?'':'<br>')+`<div class="exercise-list">`;
      
      // Group exercises by group property
      let i = 0;
      while (i < dayData.exercises.length) {
        const ex = dayData.exercises[i];
        
        if (editMode) {
          const isGrouped = (ex.groupWithNext) || (i > 0 && dayData.exercises[i-1].groupWithNext);
          const groupedClass = isGrouped ? ' grouped' : '';
          
          html+=`<div class="edit-row${groupedClass}" data-d="${d}" data-e="${i}">
              <div class="drag-handle" id="handle_${d}_${i}" style="grid-row:1;grid-column:1;">
                <span></span><span></span><span></span>
              </div>
              <input class="edit-input name-input" type="text" value="${ex.name.replace(/"/g,'&quot;')}" placeholder="Exercise name" autocomplete="off" autocorrect="off" spellcheck="false"
                onchange="days[${d}].exercises[${i}].name=this.value;saveDays();" style="grid-row:1;grid-column:2;">
              <button class="delete-btn" onclick="deleteExercise(${d},${i})" style="grid-row:1/span 2;grid-column:3;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
              <div style="grid-row:2;grid-column:1;display:flex;align-items:center;justify-content:flex-start;margin-left:-4px;padding:0 14px 0 14px;">
                <input type="checkbox" ${ex.groupWithNext?'checked':''} 
                  onchange="days[${d}].exercises[${i}].groupWithNext=this.checked;saveDays();render();"
                  style="width:14px;height:14px;cursor:pointer;margin:0;" title="Group with next">
                <span style="font-size:13px;margin-left:4px;">⬇</span>
              </div>
              <input class="edit-input weight-input" type="text" value="${ex.detail.replace(/"/g,'&quot;')}" placeholder="Sets · reps · weight" autocomplete="off" autocorrect="off" spellcheck="false"
                onchange="days[${d}].exercises[${i}].detail=this.value;saveDays();" style="grid-row:2;grid-column:2;">
            </div>`;
          i++;
        } else {
          // Check if this exercise starts a group (has groupWithNext)
          if (ex.groupWithNext) {
            // Find all exercises in this group
            const groupExercises = [];
            let j = i;
            // Add first exercise
            groupExercises.push({ ex: dayData.exercises[j], index: j });
            j++;
            // Continue while previous exercise has groupWithNext
            while (j < dayData.exercises.length && dayData.exercises[j-1].groupWithNext) {
              groupExercises.push({ ex: dayData.exercises[j], index: j });
              j++;
            }
            
            // Render as group with blue border
            html += `<div class="exercise-group">`;
              groupExercises.forEach(({ ex: gex, index: e }) => {
                const exState=getEx(d,e);
                const pickerId=`${d}_${e}`;
                const isDone=exState.done;
                const diff=exState.diff||"";
                html+=`<div class="exercise-item${isDone?' done':''}">
                  <div class="checkbox-zone" onclick="toggleDone(${d},${e})">
                    <div class="checkbox"><svg class="checkmark" viewBox="0 0 10 7"><path d="M1 3.5L3.5 6L9 1"/></svg></div>
                  </div>
                  <div class="exercise-name">${gex.name}</div>
                  <div class="diff-zone" onclick="togglePicker('${pickerId}',event)">
                    <div class="exercise-weight">${gex.detail}</div>
                    <div style="position:relative;display:inline-flex;">
                      <button class="difficulty-btn" style="${(diff||'⬤').startsWith('✔')?'color:#22c55e':''}">${displayDiff(diff||'⬤')}</button>
                      ${openPicker===pickerId?`
                      <div class="difficulty-picker" style="right:${pickerPos.right}px;${pickerPos.top!==null?'top:'+pickerPos.top+'px':'bottom:'+pickerPos.bottom+'px'}" onclick="event.stopPropagation()">
                        ${DIFFICULTIES.map(d2=>renderDiffOption(d2,d,e)).join('')}
                      </div>`:''}
                    </div>
                  </div>
                </div>`;
              });
              html += `</div>`;
              i = j; // Skip past all grouped exercises
          } else {
            // Render single exercise
            const exState=getEx(d,i);
            const pickerId=`${d}_${i}`;
            const isDone=exState.done;
            const diff=exState.diff||"";
            html+=`<div class="exercise-item${isDone?' done':''}">
              <div class="checkbox-zone" onclick="toggleDone(${d},${i})">
                <div class="checkbox"><svg class="checkmark" viewBox="0 0 10 7"><path d="M1 3.5L3.5 6L9 1"/></svg></div>
              </div>
              <div class="exercise-name">${ex.name}</div>
              <div class="diff-zone" onclick="togglePicker('${pickerId}',event)">
                <div class="exercise-weight">${ex.detail}</div>
                <div style="position:relative;display:inline-flex;">
                  <button class="difficulty-btn" style="${(diff||'⬤').startsWith('✔')?'color:#22c55e':''}">${displayDiff(diff||'⬤')}</button>
                  ${openPicker===pickerId?`
                  <div class="difficulty-picker" style="right:${pickerPos.right}px;${pickerPos.top!==null?'top:'+pickerPos.top+'px':'bottom:'+pickerPos.bottom+'px'}" onclick="event.stopPropagation()">
                    ${DIFFICULTIES.map(d2=>renderDiffOption(d2,d,i)).join('')}
                  </div>`:''}
                </div>
              </div>
            </div>`;
            i++;
          }
        }
      }
      html+=`</div>`;
    }

    if(editMode){
      html+=`<button class="add-exercise-btn" onclick="addExercise(${d})">＋ Add exercise to ${dayData.day}</button>`;
    }

    html+=`</div>`;
  });

  app.innerHTML=html;

  if(editMode){
    document.querySelectorAll('.drag-handle').forEach(handle=>{
      const id = handle.id;
      const parts = id.split('_');
      const d = parseInt(parts[1]);
      const e = parseInt(parts[2]);
      handle.addEventListener('touchstart', ev => onHandleTouchStart(ev, d, e), {passive:false});
      handle.addEventListener('mousedown', ev => onHandleMouseDown(ev, d, e));
    });
  }
}

render();
renderHeader();

// ─── Screen Wake Lock ─────────────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();
</script>
